<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Mobile-specific viewport to prevent accidental zooming on inputs -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glitchless Nights - Ticket Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Removes blue tap highlight on mobile */
        }
        .glitch-text {
            text-shadow: 2px 0 0 #ff003c, -2px 0 0 #00e5ff;
        }
        
        /* Mobile-optimized reader styling */
        #reader {
            border: none;
            width: 100% !important;
            background: #000;
        }
        #reader__dashboard_section_csr span {
            color: white !important;
            font-size: 14px;
        }
        #reader button {
            background-color: #3b82f6;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            margin: 0.5rem;
            cursor: pointer;
            font-weight: bold;
            border: none;
            font-size: 1rem;
            width: 90%;
            max-width: 300px;
        }
        #reader button:hover {
            background-color: #2563eb;
        }
        #reader video {
            object-fit: cover;
            border-radius: 0.5rem;
        }
        /* Hide the library's bottom link to save screen space */
        #reader__dashboard_section_swaplink,
        #reader__dashboard_section_fsr {
            display: none !important;
        }
    </style>
</head>
<!-- Removed padding for mobile (edge-to-edge), kept it for desktop (md+) -->
<body class="h-screen w-full flex flex-col items-center md:py-8 md:px-4 m-0 p-0 overflow-hidden">

    <!-- App Container -->
    <main class="w-full h-full md:h-auto md:max-w-md bg-gray-900 md:rounded-2xl md:shadow-2xl flex flex-col border-0 md:border border-gray-800">
        
        <!-- Header (Moved inside the main container to act as an app top-bar) -->
        <header class="text-center py-5 px-4 bg-gray-900 border-b border-gray-800 flex-shrink-0">
            <h1 class="text-3xl md:text-4xl font-black uppercase tracking-widest glitch-text mb-1">Scanner</h1>
            <p class="text-xs text-gray-400 font-semibold tracking-wider">GLITCHLESS NIGHTS ENTRY</p>
        </header>

        <!-- Scanner Interface -->
        <div id="scanner-section" class="flex flex-col flex-grow overflow-y-auto">
            
            <!-- Status Banner -->
            <div id="status-banner" class="w-full p-4 text-center font-black text-xl tracking-wide bg-gray-700 text-gray-300 flex-shrink-0 shadow-inner">
                READY TO SCAN
            </div>

            <!-- Camera View -->
            <div class="p-2 md:p-4 w-full flex-grow flex items-center justify-center bg-black">
                <div id="reader" class="w-full"></div>
            </div>

            <!-- Manual Entry Fallback -->
            <div class="p-5 md:p-6 w-full bg-gray-800 border-t border-gray-700 flex flex-col items-center flex-shrink-0 pb-8 md:pb-6">
                <p class="text-sm text-gray-400 mb-3 font-semibold">Manual Code Entry:</p>
                <div class="flex w-full max-w-sm">
                    <!-- Made inputs larger for easier mobile tapping -->
                    <input type="text" id="manual-code-input" class="flex-grow bg-black text-white p-4 rounded-l-lg border border-gray-600 focus:border-blue-500 focus:outline-none font-mono text-base uppercase" placeholder="FR26-12345">
                    <button id="manual-submit-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded-r-lg transition duration-200 active:bg-blue-700">
                        Verify
                    </button>
                </div>
            </div>
            
        </div>
    </main>

    <script>
        // --- HARDCODED VALID CODES ---
        const validCodes = [
            "FR26-22210",
            "FR26-20892",
            "FR26-83418",
            "FR26-91757",
            "FR26-58608",
            "FR26-16766",
            "FR26-71925",
            "FR26-83334",
            "FR26-60514",
            "FR26-53286",
            "FR26-76537",
            "FR26-85947",
            "FR26-87876",
            "FR26-77734",
            "FR26-84675",
            "FR26-18889",
            "FR26-81552",
            "FR26-24102",
            "FR26-11529",
            "FR26-65803",
            "FR26-83328",
            "FR26-50012",
            "FR26-57378",
            "FR26-44136",
            "FR26-60505",
            "FR26-85142",
            "FR26-58864",
            "FR26-46491",
            "FR26-62182",
            "FR26-53569",
            "FR26-10499",

            "FR26-84774",
            "FR26-43351",
            "FR26-79662",
            "FR26-59583",
            "FR26-52644",
            "FR26-56498",
        ];

        // Store scanned codes to prevent duplicates
        let usedCodes = new Set();
        let html5QrcodeScanner = null;
        let isProcessing = false;

        // DOM Elements
        const statusBanner = document.getElementById('status-banner');
        const manualCodeInput = document.getElementById('manual-code-input');
        const manualSubmitBtn = document.getElementById('manual-submit-btn');

        function setStatus(message, bgClass, textClass) {
            statusBanner.className = `w-full p-4 text-center font-black text-xl tracking-wide ${bgClass} ${textClass} transition-colors duration-300 shadow-inner`;
            statusBanner.innerText = message;
            
            // HAPTIC FEEDBACK (Vibration) for mobile devices
            if (navigator.vibrate) {
                if (bgClass.includes('green')) {
                    navigator.vibrate([100]); // Short vibration for success
                } else if (bgClass.includes('red') || bgClass.includes('orange')) {
                    navigator.vibrate([200, 100, 200]); // Angry double vibration for error
                }
            }
        }

        function processScan(decodedText) {
            if(isProcessing) return; // Prevent rapid double scans
            isProcessing = true;
            
            if (html5QrcodeScanner) {
                html5QrcodeScanner.pause(true);
            }

            const formattedCode = decodedText.trim().toUpperCase();

            // Check 1: Is the code exactly matching one in our hardcoded list?
            if (!validCodes.includes(formattedCode)) {
                setStatus("❌ INVALID TICKET", "bg-red-900", "text-red-100");
            } 
            // Check 2: Has it already been scanned?
            else if (usedCodes.has(formattedCode)) {
                setStatus("⚠️ ALREADY USED", "bg-orange-600", "text-white");
            } 
            // Check 3: Valid and unused!
            else {
                usedCodes.add(formattedCode); // Remember it for next time
                setStatus("✅ ACCESS GRANTED", "bg-green-600", "text-white");
            }

            // Wait 2 seconds, then reset to scan the next person
            setTimeout(() => {
                setStatus("READY TO SCAN", "bg-gray-700", "text-gray-300");
                isProcessing = false;
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.resume();
                }
            }, 2000);
        }

        function handleManualSubmit() {
            const code = manualCodeInput.value;
            if (code.trim() !== '') {
                // Blur the input to automatically hide the mobile keyboard
                manualCodeInput.blur();
                processScan(code);
                manualCodeInput.value = '';
            }
        }

        manualSubmitBtn.addEventListener('click', handleManualSubmit);
        manualCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleManualSubmit();
            }
        });

        function startScanner() {
            // Dynamically size the scanner box based on the user's phone screen size
            let qrboxFunction = function(viewfinderWidth, viewfinderHeight) {
                let minEdgePercentage = 0.75; 
                let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                let qrboxSize = Math.floor(minEdgeSize * minEdgePercentage);
                return {
                    width: qrboxSize,
                    height: qrboxSize
                };
            }

            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader",
                { 
                    fps: 10, 
                    qrbox: qrboxFunction,
                    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA],
                    videoConstraints: {
                        facingMode: "environment" // Forces the rear-facing camera on phones
                    }
                },
                false
            );
            
            html5QrcodeScanner.render(
                (decodedText) => processScan(decodedText),
                (errorMessage) => {}
            );
        }

        // Start camera immediately when the page loads
        window.onload = () => {
            startScanner();
        };
    </script>
</body>
</html>
