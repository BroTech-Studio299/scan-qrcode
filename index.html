<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glitchless Nights - Ticket Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        html, body {
            height: 100%;
            width: 100%;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            touch-action: manipulation;
            /* Use dynamic viewport height to avoid mobile browser chrome cutting off content */
            height: 100dvh;
        }
        main {
            height: 100dvh;
        }
        .glitch-text {
            text-shadow: 2px 0 0 #ff003c, -2px 0 0 #00e5ff;
        }

        header {
            padding-top: max(env(safe-area-inset-top), 1rem);
        }

        /* Clean, custom canvas styling - NO LIBRARY INTERFERENCE */
        #camera-canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: min(350px, 80vw);
            /* Cap height so it never forces the page to scroll on short screens */
            max-height: 40vh;
            aspect-ratio: 1 / 1; /* Makes it a perfect square */
            background-color: #050505;
            border: 2px solid #333;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* Manual entry area respects iPhone home-indicator safe area */
        .pb-safe {
            padding-bottom: max(env(safe-area-inset-bottom), 1rem);
        }

        /* Scale text/buttons down on very small / short screens (e.g. SE, landscape) */
        @media (max-height: 700px) {
            #camera-canvas-wrapper {
                max-height: 32vh;
            }
            header h1 {
                font-size: 1.5rem;
            }
            #start-camera-btn {
                margin-top: 1rem;
                padding-top: 0.75rem;
                padding-bottom: 0.75rem;
            }
        }

        @media (max-height: 560px) {
            header {
                padding-top: max(env(safe-area-inset-top), 0.5rem);
                padding-bottom: 0.5rem;
            }
            header p {
                display: none;
            }
            #camera-canvas-wrapper {
                max-height: 26vh;
            }
        }

        /* Small phones in width */
        @media (max-width: 360px) {
            header h1 {
                font-size: 1.25rem;
                letter-spacing: 0.05em;
            }
            #start-camera-btn {
                font-size: 1rem;
                padding: 0.75rem 1rem;
            }
            #manual-code-input, #manual-submit-btn {
                padding: 0.65rem 0.75rem;
                font-size: 0.95rem;
            }
        }

        #scan-popup-content {
            width: min(90vw, 24rem);
        }

        #scan-popup-icon {
            font-size: clamp(3rem, 12vw, 4.5rem);
        }

        #scan-popup-text {
            font-size: clamp(1.25rem, 6vw, 1.875rem);
        }
    </style>
</head>

<body class="w-full flex flex-col items-center m-0 p-0 overflow-hidden bg-black">

    <main class="w-full flex flex-col bg-gray-900 border-0 relative">

        <!-- Header -->
        <header class="text-center py-3 px-4 bg-gray-900 flex-shrink-0 z-10 shadow-md">
            <h1 class="text-2xl md:text-4xl font-black uppercase tracking-widest glitch-text mb-1">Scanner</h1>
            <p class="text-[10px] md:text-xs text-gray-400 font-semibold tracking-wider">GLITCHLESS NIGHTS ENTRY</p>
        </header>

        <!-- Status Banner -->
        <div id="status-banner" class="w-full py-2 px-2 text-center font-bold text-sm tracking-wide bg-gray-800 text-gray-400 flex-shrink-0 z-10">
            SYSTEM READY
        </div>

        <!-- Camera Section -->
        <div class="flex-grow flex flex-col items-center justify-center bg-black w-full min-h-0 relative px-4 py-3 overflow-hidden">

            <!-- 1. THE CAMERA CANVAS -->
            <div id="camera-canvas-wrapper">
                <div id="reader"></div>
                <!-- Placeholder text before camera starts -->
                <div id="camera-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-600 pointer-events-none">
                    <svg class="w-12 h-12 sm:w-16 sm:h-16 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span class="font-bold tracking-widest uppercase text-xs sm:text-sm">Camera Off</span>
                </div>
            </div>

            <!-- 2. THE BUTTON (COMPLETELY SEPARATED AND BELOW THE CANVAS) -->
            <button id="start-camera-btn" class="mt-6 sm:mt-8 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 sm:py-4 px-8 rounded-xl shadow-lg transition duration-200 w-full max-w-sm active:bg-blue-700 text-base sm:text-lg flex-shrink-0">
                Request Camera Permissions
            </button>

        </div>

        <!-- Manual Entry Fallback -->
        <div class="w-full bg-gray-800 border-t border-gray-700 flex flex-col items-center flex-shrink-0 pt-3 sm:pt-4 pb-4 sm:pb-6 px-4 z-10 pb-safe">
            <p class="text-xs md:text-sm text-gray-400 mb-2 font-semibold uppercase tracking-wider">Manual Entry</p>
            <div class="flex w-full max-w-sm">
                <input type="text" id="manual-code-input" class="flex-grow bg-black text-white p-3 md:p-4 rounded-l-xl border border-gray-600 focus:border-blue-500 focus:outline-none font-mono text-base uppercase shadow-inner" placeholder="FR26-12345" inputmode="text" autocapitalize="characters" autocomplete="off">
                <button id="manual-submit-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 md:py-4 px-6 rounded-r-xl transition duration-200 active:bg-blue-700 shadow-lg">
                    Verify
                </button>
            </div>
        </div>

    </main>

    <!-- FULLSCREEN POP-UP MODAL -->
    <div id="scan-popup" class="fixed inset-0 z-50 flex items-center justify-center bg-black/85 backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none hidden p-4">
        <div id="scan-popup-content" class="relative transform scale-90 transition-transform duration-300 p-6 sm:p-8 rounded-3xl shadow-2xl text-center flex flex-col items-center justify-center w-10/12 max-w-sm min-h-[220px] sm:min-h-[250px]">
            <button id="scan-popup-close" aria-label="Close" class="absolute top-3 right-3 w-9 h-9 rounded-full bg-black/30 hover:bg-black/50 text-white text-xl font-bold flex items-center justify-center leading-none">&times;</button>
            <div id="scan-popup-icon" class="mb-4 drop-shadow-lg"></div>
            <h2 id="scan-popup-text" class="font-black uppercase tracking-wider text-white drop-shadow-md leading-tight"></h2>
            <p id="scan-popup-subtext" class="mt-2 text-sm font-semibold text-white/90 tracking-wide uppercase"></p>
            <p class="mt-4 text-xs text-white/70 font-medium">Tap anywhere to continue</p>
        </div>
    </div>

                "FR26-63967",

        ];

        // --- PERSISTED "ALREADY USED" LIST (survives page refresh) ---
        const STORAGE_KEY = 'glitchless_used_codes';

        function loadUsedCodes() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? new Set(JSON.parse(raw)) : new Set();
            } catch (e) {
                console.error('Could not read used codes from storage', e);
                return new Set();
            }
        }

        function saveUsedCodes() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(usedCodes)));
            } catch (e) {
                console.error('Could not save used codes to storage', e);
            }
        }

        let usedCodes = loadUsedCodes();
        let html5QrCode = null; // Using the core engine now
        let isProcessing = false; // true while a popup is open and waiting to be dismissed

        const manualCodeInput = document.getElementById('manual-code-input');
        const manualSubmitBtn = document.getElementById('manual-submit-btn');
        const startCameraBtn = document.getElementById('start-camera-btn');
        const cameraPlaceholder = document.getElementById('camera-placeholder');

        // POP-UP LOGIC (stays open until the user dismisses it)
        const popupEl = document.getElementById('scan-popup');
        const popupContentEl = document.getElementById('scan-popup-content');
        const popupCloseBtn = document.getElementById('scan-popup-close');

        function showPopup(type, hasFoodAccess) {
            const popup = popupEl;
            const content = popupContentEl;
            const icon = document.getElementById('scan-popup-icon');
            const text = document.getElementById('scan-popup-text');
            const subtext = document.getElementById('scan-popup-subtext');

            popup.classList.remove('hidden');
            requestAnimationFrame(() => {
                popup.classList.remove('opacity-0');
                content.classList.remove('scale-90');
                content.classList.add('scale-100');
            });

            subtext.innerText = '';

            if (type === 'GRANTED') {
                content.className = 'relative transform transition-transform duration-300 p-6 sm:p-8 rounded-3xl shadow-[0_0_50px_rgba(22,163,74,0.6)] text-center flex flex-col items-center justify-center w-10/12 max-w-sm min-h-[220px] sm:min-h-[250px] bg-green-600';
                icon.innerText = '✅';
                text.innerText = 'ACCESS GRANTED';
                if (hasFoodAccess) {
                    subtext.innerText = '🍔 FOOD ACCESS INCLUDED';
                }
                if (navigator.vibrate) navigator.vibrate([100]);
            } else if (type === 'USED') {
                content.className = 'relative transform transition-transform duration-300 p-6 sm:p-8 rounded-3xl shadow-[0_0_50px_rgba(234,88,12,0.6)] text-center flex flex-col items-center justify-center w-10/12 max-w-sm min-h-[220px] sm:min-h-[250px] bg-orange-600';
                icon.innerText = '⚠️';
                text.innerText = 'ALREADY USED';
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            } else {
                content.className = 'relative transform transition-transform duration-300 p-6 sm:p-8 rounded-3xl shadow-[0_0_50px_rgba(185,28,28,0.6)] text-center flex flex-col items-center justify-center w-10/12 max-w-sm min-h-[220px] sm:min-h-[250px] bg-red-700';
                icon.innerText = '❌';
                text.innerText = 'INVALID TICKET';
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            }
        }

        function closePopup() {
            popupEl.classList.add('opacity-0');
            popupContentEl.classList.remove('scale-100');
            popupContentEl.classList.add('scale-90');
            setTimeout(() => {
                popupEl.classList.add('hidden');
            }, 300);

            isProcessing = false;
            if (html5QrCode && html5QrCode.getState() === Html5QrcodeScannerState.PAUSED) {
                html5QrCode.resume();
            }
        }

        // Close on the X button or by tapping anywhere on the popup
        popupCloseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closePopup();
        });
        popupEl.addEventListener('click', () => {
            if (!popupEl.classList.contains('hidden')) closePopup();
        });

        function processScan(decodedText) {
            if(isProcessing) return; 
            isProcessing = true;
            
            // Pause the camera feed while showing the popup
            if (html5QrCode && html5QrCode.getState() === Html5QrcodeScannerState.SCANNING) {
                html5QrCode.pause(true);
            }

            const formattedCode = decodedText.trim().toUpperCase();

            if (!validCodes.includes(formattedCode)) {
                showPopup('INVALID');
            } 
            else if (usedCodes.has(formattedCode)) {
                showPopup('USED');
            } 
            else {
                usedCodes.add(formattedCode);
                saveUsedCodes();
                const hasFoodAccess = foodAccessCodes.includes(formattedCode);
                showPopup('GRANTED', hasFoodAccess);
            }

            // Popup now stays open until the user taps it or the close button.
            // Camera resumes inside closePopup().
        }

        // START CAMERA LOGIC (CUSTOM)
        startCameraBtn.addEventListener('click', () => {
            startCameraBtn.innerText = "Starting Camera...";
            startCameraBtn.disabled = true;

            html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" }, // Force back camera
                {
                    fps: 10,
                    qrbox: function(viewfinderWidth, viewfinderHeight) {
                        let minEdgePercentage = 0.70; 
                        let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                        let qrboxSize = Math.floor(minEdgeSize * minEdgePercentage);
                        return { width: qrboxSize, height: qrboxSize };
                    }
                },
                (decodedText) => {
                    processScan(decodedText);
                },
                (errorMessage) => {
                    // Ignore background scan errors
                }
            ).then(() => {
                // If camera starts successfully, hide the button and placeholder
                startCameraBtn.classList.add('hidden');
                cameraPlaceholder.classList.add('hidden');
            }).catch((err) => {
                alert("Camera access denied or failed to start.");
                startCameraBtn.innerText = "Request Camera Permissions";
                startCameraBtn.disabled = false;
            });
        });

        // MANUAL ENTRY LOGIC
        function handleManualSubmit() {
            const code = manualCodeInput.value;
            if (code.trim() !== '') {
                manualCodeInput.blur();
                processScan(code);
                manualCodeInput.value = '';
            }
        }

        manualSubmitBtn.addEventListener('click', handleManualSubmit);
        manualCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleManualSubmit();
            }
        });

        // Keep layout correct when mobile browser chrome shows/hides (address bar etc.)
        function setViewportHeightVar() {
            document.documentElement.style.setProperty('--vh', `${window.innerHeight}px`);
        }
        setViewportHeightVar();
        window.addEventListener('resize', setViewportHeightVar);
        window.addEventListener('orientationchange', setViewportHeightVar);
    </script>

</html>
