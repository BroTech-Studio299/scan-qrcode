<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glitchless Nights - Ticket Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            touch-action: manipulation;
        }
        .glitch-text {
            text-shadow: 2px 0 0 #ff003c, -2px 0 0 #00e5ff;
        }
        
        /* Clean, custom canvas styling - NO LIBRARY INTERFERENCE */
        #camera-canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1 / 1; /* Makes it a perfect square */
            background-color: #050505;
            border: 2px solid #333;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }
    </style>
</head>

<body class="h-screen w-full flex flex-col items-center m-0 p-0 overflow-hidden bg-black">

    <main class="w-full h-full flex flex-col bg-gray-900 border-0 relative">
        
        <!-- Header -->
        <header class="text-center py-4 px-4 bg-gray-900 flex-shrink-0 z-10 shadow-md">
            <h1 class="text-2xl md:text-4xl font-black uppercase tracking-widest glitch-text mb-1">Scanner</h1>
            <p class="text-[10px] md:text-xs text-gray-400 font-semibold tracking-wider">GLITCHLESS NIGHTS ENTRY</p>
        </header>

        <!-- Status Banner -->
        <div id="status-banner" class="w-full py-2 px-2 text-center font-bold text-sm tracking-wide bg-gray-800 text-gray-400 flex-shrink-0 z-10">
            SYSTEM READY
        </div>

        <!-- Camera Section -->
        <div class="flex-grow flex flex-col items-center justify-center bg-black w-full min-h-0 relative px-4 py-4">
            
            <!-- 1. THE CAMERA CANVAS -->
            <div id="camera-canvas-wrapper">
                <div id="reader"></div>
                <!-- Placeholder text before camera starts -->
                <div id="camera-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-600 pointer-events-none">
                    <svg class="w-16 h-16 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span class="font-bold tracking-widest uppercase text-sm">Camera Off</span>
                </div>
            </div>

            <!-- 2. THE BUTTON (COMPLETELY SEPARATED AND BELOW THE CANVAS) -->
            <button id="start-camera-btn" class="mt-8 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded-xl shadow-lg transition duration-200 w-full max-w-sm active:bg-blue-700 text-lg">
                Request Camera Permissions
            </button>

        </div>

        <!-- Manual Entry Fallback -->
        <div class="w-full bg-gray-800 border-t border-gray-700 flex flex-col items-center flex-shrink-0 pt-4 pb-6 px-4 z-10 pb-safe">
            <p class="text-xs md:text-sm text-gray-400 mb-2 font-semibold uppercase tracking-wider">Manual Entry</p>
            <div class="flex w-full max-w-sm">
                <input type="text" id="manual-code-input" class="flex-grow bg-black text-white p-3 md:p-4 rounded-l-xl border border-gray-600 focus:border-blue-500 focus:outline-none font-mono text-base uppercase shadow-inner" placeholder="FR26-12345">
                <button id="manual-submit-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 md:py-4 px-6 rounded-r-xl transition duration-200 active:bg-blue-700 shadow-lg">
                    Verify
                </button>
            </div>
        </div>
        
    </main>

    <!-- FULLSCREEN POP-UP MODAL -->
    <div id="scan-popup" class="fixed inset-0 z-50 flex items-center justify-center bg-black/85 backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none hidden">
        <div id="scan-popup-content" class="transform scale-90 transition-transform duration-300 p-8 rounded-3xl shadow-2xl text-center flex flex-col items-center justify-center w-10/12 max-w-sm min-h-[250px]">
            <div id="scan-popup-icon" class="text-7xl mb-4 drop-shadow-lg"></div>
            <h2 id="scan-popup-text" class="text-3xl font-black uppercase tracking-wider text-white drop-shadow-md leading-tight"></h2>
        </div>
    </div>

    <script>
        // --- HARDCODED VALID CODES ---
        const validCodes = [
            "FR26-12345",
            "FR26-67890",
            "FR26-11111",
            "FR26-22222",
            "FR26-99999" // Add your codes here
        ];

        let usedCodes = new Set();
        let html5QrCode = null; // Using the core engine now
        let isProcessing = false;

        const manualCodeInput = document.getElementById('manual-code-input');
        const manualSubmitBtn = document.getElementById('manual-submit-btn');
        const startCameraBtn = document.getElementById('start-camera-btn');
        const cameraPlaceholder = document.getElementById('camera-placeholder');

        // POP-UP LOGIC
        function showPopup(type) {
            const popup = document.getElementById('scan-popup');
            const content = document.getElementById('scan-popup-content');
            const icon = document.getElementById('scan-popup-icon');
            const text = document.getElementById('scan-popup-text');

            popup.classList.remove('hidden');
            requestAnimationFrame(() => {
                popup.classList.remove('opacity-0');
                content.classList.remove('scale-90');
                content.classList.add('scale-100');
            });

            if (type === 'GRANTED') {
                content.className = 'transform transition-transform duration-300 p-8 rounded-3xl shadow-[0_0_50px_rgba(22,163,74,0.6)] text-center flex flex-col items-center justify-center w-10/12 max-w-sm min-h-[250px] bg-green-600';
                icon.innerText = '✅';
                text.innerText = 'ACCESS GRANTED';
                if (navigator.vibrate) navigator.vibrate([100]); 
            } else if (type === 'USED') {
                content.className = 'transform transition-transform duration-300 p-8 rounded-3xl shadow-[0_0_50px_rgba(234,88,12,0.6)] text-center flex flex-col items-center justify-center w-10/12 max-w-sm min-h-[250px] bg-orange-600';
                icon.innerText = '⚠️';
                text.innerText = 'ALREADY USED';
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]); 
            } else {
                content.className = 'transform transition-transform duration-300 p-8 rounded-3xl shadow-[0_0_50px_rgba(185,28,28,0.6)] text-center flex flex-col items-center justify-center w-10/12 max-w-sm min-h-[250px] bg-red-700';
                icon.innerText = '❌';
                text.innerText = 'INVALID TICKET';
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]); 
            }

            setTimeout(() => {
                popup.classList.add('opacity-0');
                content.classList.remove('scale-100');
                content.classList.add('scale-90');
                setTimeout(() => {
                    popup.classList.add('hidden');
                }, 300);
            }, 2000);
        }

        function processScan(decodedText) {
            if(isProcessing) return; 
            isProcessing = true;
            
            // Pause the camera feed while showing the popup
            if (html5QrCode && html5QrCode.getState() === Html5QrcodeScannerState.SCANNING) {
                html5QrCode.pause(true);
            }

            const formattedCode = decodedText.trim().toUpperCase();

            if (!validCodes.includes(formattedCode)) {
                showPopup('INVALID');
            } 
            else if (usedCodes.has(formattedCode)) {
                showPopup('USED');
            } 
            else {
                usedCodes.add(formattedCode); 
                showPopup('GRANTED');
            }

            // Resume after popup finishes
            setTimeout(() => {
                isProcessing = false;
                if (html5QrCode && html5QrCode.getState() === Html5QrcodeScannerState.PAUSED) {
                    html5QrCode.resume();
                }
            }, 2300);
        }

        // START CAMERA LOGIC (CUSTOM)
        startCameraBtn.addEventListener('click', () => {
            startCameraBtn.innerText = "Starting Camera...";
            startCameraBtn.disabled = true;

            html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" }, // Force back camera
                {
                    fps: 10,
                    qrbox: function(viewfinderWidth, viewfinderHeight) {
                        let minEdgePercentage = 0.70; 
                        let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                        let qrboxSize = Math.floor(minEdgeSize * minEdgePercentage);
                        return { width: qrboxSize, height: qrboxSize };
                    }
                },
                (decodedText) => {
                    processScan(decodedText);
                },
                (errorMessage) => {
                    // Ignore background scan errors
                }
            ).then(() => {
                // If camera starts successfully, hide the button and placeholder
                startCameraBtn.classList.add('hidden');
                cameraPlaceholder.classList.add('hidden');
            }).catch((err) => {
                alert("Camera access denied or failed to start.");
                startCameraBtn.innerText = "Request Camera Permissions";
                startCameraBtn.disabled = false;
            });
        });

        // MANUAL ENTRY LOGIC
        function handleManualSubmit() {
            const code = manualCodeInput.value;
            if (code.trim() !== '') {
                manualCodeInput.blur();
                processScan(code);
                manualCodeInput.value = '';
            }
        }

        manualSubmitBtn.addEventListener('click', handleManualSubmit);
        manualCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleManualSubmit();
            }
        });
    </script>
</body>
</html>
