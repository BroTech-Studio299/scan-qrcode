<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glitchless Nights - Ticket Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --app-height: 100vh;
        }
        
        html, body {
            height: 100%;
            width: 100%;
        }
        
        body {
            background-color: #030712; /* Deep slate / black */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            touch-action: manipulation;
            height: var(--app-height);
        }
        
        main {
            height: var(--app-height);
        }

        /* Refined, more professional glitch effect */
        .glitch-text {
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 60, 0.75), -0.025em -0.05em 0 rgba(0, 229, 255, 0.75),
                         0.025em 0.05em 0 rgba(0, 255, 0, 0.75);
            animation: glitch 3s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 60, 0.75), -0.05em -0.025em 0 rgba(0, 229, 255, 0.75), -0.025em 0.05em 0 rgba(0, 255, 0, 0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255, 0, 60, 0.75), -0.05em -0.025em 0 rgba(0, 229, 255, 0.75), -0.025em 0.05em 0 rgba(0, 255, 0, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 60, 0.75), 0.025em 0.025em 0 rgba(0, 229, 255, 0.75), -0.05em -0.05em 0 rgba(0, 255, 0, 0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 60, 0.75), 0.025em 0.025em 0 rgba(0, 229, 255, 0.75), -0.05em -0.05em 0 rgba(0, 255, 0, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 60, 0.75), 0.05em 0 0 rgba(0, 229, 255, 0.75), 0 -0.05em 0 rgba(0, 255, 0, 0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 60, 0.75), 0.05em 0 0 rgba(0, 229, 255, 0.75), 0 -0.05em 0 rgba(0, 255, 0, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 60, 0.75), -0.025em -0.025em 0 rgba(0, 229, 255, 0.75), -0.025em -0.05em 0 rgba(0, 255, 0, 0.75); }
        }

        header {
            padding-top: max(env(safe-area-inset-top), 1rem);
        }

        .pb-safe {
            padding-bottom: max(env(safe-area-inset-bottom), 1.5rem);
        }

        /* Clean canvas styling */
        #camera-canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: min(320px, 75vw);
            max-height: 40vh;
            aspect-ratio: 1 / 1;
            background-color: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
        }

        /* Hide the ugly default HTML5-QRCode UI elements if they pop up */
        #reader img, #reader span, #reader a { display: none !important; }
        #reader { border: none !important; width: 100%; height: 100%; }
        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* Professional Scanner Corner Brackets */
        .scanner-corner {
            position: absolute;
            width: 2.5rem;
            height: 2.5rem;
            border-color: #3b82f6; /* Blue-500 */
            border-style: solid;
            z-index: 20;
            opacity: 0.8;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .corner-tl { top: 1rem; left: 1rem; border-width: 3px 0 0 3px; border-top-left-radius: 0.5rem; }
        .corner-tr { top: 1rem; right: 1rem; border-width: 3px 3px 0 0; border-top-right-radius: 0.5rem; }
        .corner-bl { bottom: 1rem; left: 1rem; border-width: 0 0 3px 3px; border-bottom-left-radius: 0.5rem; }
        .corner-br { bottom: 1rem; right: 1rem; border-width: 0 3px 3px 0; border-bottom-right-radius: 0.5rem; }

        /* Scanner Scanline Animation */
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            box-shadow: 0 0 10px #3b82f6;
            animation: scan 2.5s infinite linear;
            z-index: 15;
            opacity: 0;
        }
        
        .camera-active .scanline { opacity: 1; }

        @keyframes scan {
            0% { top: 10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }

        /* Pulsing Status Dot */
        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #10b981;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Responsive Tweaks */
        @media (max-height: 700px) {
            #camera-canvas-wrapper { max-height: 32vh; }
            header h1 { font-size: 1.5rem; }
        }

        @media (max-height: 560px) {
            header { padding-top: max(env(safe-area-inset-top), 0.5rem); padding-bottom: 0.5rem; }
            #camera-canvas-wrapper { max-height: 26vh; }
        }

        /* Custom Input styling */
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
    </style>
</head>

                <span>Activate Scanner</span>

            <p class="text-[10px] text-slate-400 mb-3 font-bold uppercase tracking-[0.2em]">Manual Override</p>
            <div class="flex w-full max-w-sm bg-slate-950 rounded-xl border border-white/10 p-1 shadow-inner focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">

                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>

                    VERIFY

        </div>

    </main>

                "FR26-42361",
                "FR26-60076",
                "FR26-11827",
                "FR26-73741",
                "FR26-10656",
                "FR26-82788",
                "FR26-53094",
                "FR26-29459",
                "FR26-85038",
                "FR26-49519",
                "FR26-55691",
                "FR26-21768",
                "FR26-75071",
                "FR26-90301",
                "FR26-11445",
                "FR26-21095",
                "FR26-45312",
                "FR26-16784",
                "FR26-16956",
                "FR26-15750",
                "FR26-44967",
                "FR26-69777",
                "FR26-96992",
                "FR26-87952",
                "FR26-66429",
        ];

        // --- PERSISTED "ALREADY USED" LIST ---
        const STORAGE_KEY = 'glitchless_used_codes';

        function loadUsedCodes() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? new Set(JSON.parse(raw)) : new Set();
            } catch (e) {
                console.error('Could not read used codes', e);
                return new Set();
            }
        }

        function saveUsedCodes() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(usedCodes)));
            } catch (e) {
                console.error('Could not save used codes', e);
            }
        }

        let usedCodes = loadUsedCodes();
        let html5QrCode = null; 
        let isProcessing = false; 

        const manualCodeInput = document.getElementById('manual-code-input');
        const manualSubmitBtn = document.getElementById('manual-submit-btn');
        const startCameraBtn = document.getElementById('start-camera-btn');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const scanline = document.getElementById('scanline');
        const cameraCanvasWrapper = document.getElementById('camera-canvas-wrapper');

        // POP-UP DOM
        const popupEl = document.getElementById('scan-popup');
        const popupContentEl = document.getElementById('scan-popup-content');
        const popupCloseBtn = document.getElementById('scan-popup-close');
        
        // SVG ICONS FOR POPUPS
        const ICONS = {
            GRANTED: `<svg class="w-24 h-24 text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.6)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
            USED: `<svg class="w-24 h-24 text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.6)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`,
            INVALID: `<svg class="w-24 h-24 text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.6)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
        };

        function showPopup(type, hasFoodAccess) {
            const popup = popupEl;
            const content = popupContentEl;
            const icon = document.getElementById('scan-popup-icon');
            const text = document.getElementById('scan-popup-text');
            const subtextContainer = document.getElementById('scan-popup-subtext-container');
            const subtext = document.getElementById('scan-popup-subtext');

            popup.classList.remove('hidden');
            popup.classList.remove('pointer-events-none');
            requestAnimationFrame(() => {
                popup.classList.remove('opacity-0');
                content.classList.remove('scale-90');
                content.classList.add('scale-100');
            });

            subtextContainer.classList.add('hidden');

            // Set styling based on type
            if (type === 'GRANTED') {
                content.className = 'relative transform transition-all duration-400 p-8 rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(16,185,129,0.8)] text-center flex flex-col items-center justify-center w-full max-w-sm min-h-[280px] bg-gradient-to-br from-emerald-500 to-green-700 border border-green-400/50';
                icon.innerHTML = ICONS.GRANTED;
                text.innerText = 'ACCESS GRANTED';
                if (hasFoodAccess) {
                    subtextContainer.classList.remove('hidden');
                    subtext.innerText = '🍔 FOOD ACCESS';
                }
                if (navigator.vibrate) navigator.vibrate([100]);
            } else if (type === 'USED') {
                content.className = 'relative transform transition-all duration-400 p-8 rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(245,158,11,0.8)] text-center flex flex-col items-center justify-center w-full max-w-sm min-h-[280px] bg-gradient-to-br from-amber-500 to-orange-700 border border-orange-400/50';
                icon.innerHTML = ICONS.USED;
                text.innerText = 'ALREADY USED';
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            } else {
                content.className = 'relative transform transition-all duration-400 p-8 rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(225,29,72,0.8)] text-center flex flex-col items-center justify-center w-full max-w-sm min-h-[280px] bg-gradient-to-br from-rose-600 to-red-800 border border-red-400/50';
                icon.innerHTML = ICONS.INVALID;
                text.innerText = 'INVALID TICKET';
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            }
        }

        function closePopup() {
            popupEl.classList.add('opacity-0');
            popupContentEl.classList.remove('scale-100');
            popupContentEl.classList.add('scale-90');
            setTimeout(() => {
                popupEl.classList.add('hidden');
                popupEl.classList.add('pointer-events-none');
            }, 300);

            isProcessing = false;
            if (html5QrCode && html5QrCode.getState() === Html5QrcodeScannerState.PAUSED) {
                html5QrCode.resume();
            }
        }

        popupCloseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closePopup();
        });
        popupEl.addEventListener('click', () => {
            if (!popupEl.classList.contains('hidden')) closePopup();
        });

        function processScan(decodedText) {
            if(isProcessing) return; 
            isProcessing = true;
            
            if (html5QrCode && html5QrCode.getState() === Html5QrcodeScannerState.SCANNING) {
                html5QrCode.pause(true);
            }

            const formattedCode = decodedText.trim().toUpperCase();
            const isValid = validCodes.includes(formattedCode) || foodAccessCodes.includes(formattedCode);

            if (!isValid) {
                showPopup('INVALID');
            } 
            else if (usedCodes.has(formattedCode)) {
                showPopup('USED');
            } 
            else {
                usedCodes.add(formattedCode);
                saveUsedCodes();
                const hasFoodAccess = foodAccessCodes.includes(formattedCode);
                showPopup('GRANTED', hasFoodAccess);
            }
        }

        // START CAMERA
        startCameraBtn.addEventListener('click', () => {
            startCameraBtn.innerHTML = `<span class="animate-pulse">Initializing...</span>`;
            startCameraBtn.disabled = true;

            html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" },
                {
                    fps: 10,
                    qrbox: function(viewfinderWidth, viewfinderHeight) {
                        let minEdgePercentage = 0.70; 
                        let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                        let qrboxSize = Math.floor(minEdgeSize * minEdgePercentage);
                        return { width: qrboxSize, height: qrboxSize };
                    }
                },
                (decodedText) => {
                    processScan(decodedText);
                },
                (errorMessage) => {}
            ).then(() => {
                startCameraBtn.classList.add('hidden');
                cameraPlaceholder.classList.add('hidden');
                scanline.classList.remove('hidden');
                cameraCanvasWrapper.classList.add('camera-active');
            }).catch((err) => {
                alert("Camera access denied or failed to start.");
                startCameraBtn.innerHTML = "<span>Activate Scanner</span>";
                startCameraBtn.disabled = false;
            });
        });

        // MANUAL ENTRY
        function handleManualSubmit() {
            const code = manualCodeInput.value;
            if (code.trim() !== '') {
                manualCodeInput.blur();
                processScan(code);
                manualCodeInput.value = '';
            }
        }

        manualSubmitBtn.addEventListener('click', handleManualSubmit);
        manualCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleManualSubmit();
            }
        });

        // Dynamic Viewport Height for mobile browsers
        function setViewportHeightVar() {
            document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        }
        setViewportHeightVar();
        window.addEventListener('resize', setViewportHeightVar);
        window.addEventListener('orientationchange', setViewportHeightVar);
    </script>
</body>
